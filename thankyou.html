<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Urban Concept Solutions</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(212, 175, 55, 0.2), transparent 30%),
        linear-gradient(135deg, #050505, #111);
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .box {
      max-width: 680px;
      background: linear-gradient(180deg, #111, #070707);
      border: 1px solid rgba(212, 175, 55, 0.35);
      border-radius: 28px;
      padding: 50px 35px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border: 1px solid rgba(212, 175, 55, 0.45);
      border-radius: 999px;
      color: #d4af37;
      margin-bottom: 24px;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 46px;
      margin-bottom: 16px;
    }

    p {
      color: #bdbdbd;
      font-size: 18px;
      margin-bottom: 30px;
    }

    a {
      display: inline-block;
      background: linear-gradient(135deg, #d4af37, #f5d76e);
      color: #050505;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 999px;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="badge">Request Received</div>
    <h1>Thank You.</h1>
    <p>
      Your request has been sent to Urban Concept Solutions.
      We’ll review your information and contact you shortly.
    </p>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
