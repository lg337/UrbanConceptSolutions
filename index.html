<div id="contactForm" class="form-section">
    <form action="https://formspree.io/f/mqevlqae" method="POST">

        <h2>Request a Free Consultation</h2>
        <p>Tell us a little about your business and we'll reach out within one business day.</p>

        <input type="hidden" id="selectedPlan" name="Selected Plan">

        <label>Full Name</label>
        <input
            type="text"
            name="Name"
            placeholder="John Smith"
            required>

        <label>Email Address</label>
        <input
            type="email"
            name="Email"
            placeholder="john@email.com"
            required>

        <label>Phone Number</label>
        <input
            type="tel"
            name="Phone"
            placeholder="(555) 555-5555"
            required>

        <label>Business Name</label>
        <input
            type="text"
            name="Business Name"
            placeholder="ABC Restaurant">

        <label>Business Type</label>
        <select name="Business Type">
            <option>Restaurant</option>
            <option>Retail Store</option>
            <option>Barbershop</option>
            <option>Salon</option>
            <option>Office</option>
            <option>Medical Practice</option>
            <option>Gym</option>
            <option>Other</option>
        </select>

        <label>Services Needed</label>
        <select name="Service Needed">
            <option>Complete IT Setup</option>
            <option>POS Installation</option>
            <option>Security Cameras</option>
            <option>Computer Setup</option>
            <option>Networking / Wi-Fi</option>
            <option>Monthly IT Support</option>
            <option>Marketing Services</option>
        </select>

        <label>Tell us about your project</label>
        <textarea
            name="Project Details"
            rows="6"
            placeholder="Describe your business and what you're looking to accomplish."></textarea>

        <button class="btn" type="submit">
            Send Request →
        </button>

    </form>
</div>
